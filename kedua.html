<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iframe Permission Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background-color: #fff;
        }
        h3 { color: #333; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }
        button {
            padding: 12px;
            font-size: 14px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            transition: background 0.2s;
        }
        button:hover { background-color: #0056b3; }
        #log {
            width: 100%;
            height: 150px;
            background-color: #222;
            color: #0f0;
            font-family: monospace;
            padding: 10px;
            box-sizing: border-box;
            overflow-y: auto;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<h3>Iframe Permission Tester</h3>
<div class="grid">
    <button onclick="requestGeolocation()">Geolocation</button>
    <button onclick="requestCamera()">Kamera</button>
    <button onclick="requestMicrophone()">Mikrofon</button>
    <button onclick="requestNotification()">Notifikasi</button>
</div>

<h4>Log Output:</h4>
<div id="log">Sistem siap. Klik salah satu tombol di atas...</div>

<script>
    const logDiv = document.getElementById('log');

    function log(message, isError = false) {
        const time = new Date().toLocaleTimeString();
        const color = isError ? 'red' : '#0f0';
        logDiv.innerHTML += `<br><span style="color: ${color}">[${time}] ${message}</span>`;
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    // 1. Uji Geolokasi
    function requestGeolocation() {
        log("Meminta izin Geolocation...");
        if (!navigator.geolocation) {
            log("Geolocation tidak didukung browser ini.", true);
            return;
        }
        navigator.geolocation.getCurrentPosition(
            (position) => log(`Sukses: Lat ${position.coords.latitude}, Lon ${position.coords.longitude}`),
            (error) => log(`Gagal: ${error.message} (Kode: ${error.code})`, true)
        );
    }

    // 2. Uji Kamera
    async function requestCamera() {
        log("Meminta izin Kamera...");
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            log("Sukses: Akses kamera diberikan.");
            // Hentikan stream langsung setelah tes berhasil agar kamera mati kembali
            stream.getTracks().forEach(track => track.stop());
        } catch (error) {
            log(`Gagal: ${error.name} - ${error.message}`, true);
        }
    }

    // 3. Uji Mikrofon
    async function requestMicrophone() {
        log("Meminta izin Mikrofon...");
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            log("Sukses: Akses mikrofon diberikan.");
            stream.getTracks().forEach(track => track.stop());
        } catch (error) {
            log(`Gagal: ${error.name} - ${error.message}`, true);
        }
    }

    // 4. Uji Notifikasi
    function requestNotification() {
        log("Meminta izin Notifikasi...");
        if (!("Notification" in window)) {
            log("Notifikasi tidak didukung di browser ini.", true);
            return;
        }
        Notification.requestPermission().then((permission) => {
            log(`Hasil Izin Notifikasi: ${permission}`);
        }).catch(error => {
            log(`Gagal: ${error.message}`, true);
        });
    }
</script>

</body>
</html>
